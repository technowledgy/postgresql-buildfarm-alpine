require 'shared.conf';

$PGBuild::conf{animal} = $ENV{ANIMAL} // 'autoconf';
$PGBuild::conf{secret} = $ENV{SECRET} // $PGBuild::conf{secret};

$PGBuild::conf{make_jobs} = 2;

@PGBuild::conf{build_env}->{PG_TEST_EXTRA} = 'ssl kerberos ldap oauth libpq_encryption load_balance';

push(@{$PGBuild::conf{config_opts}}, (
	'--enable-tap-tests',
	'--with-icu',
	'--with-llvm',
	'--with-pam',
	'--with-ssl=openssl',
	'--with-uuid=ossp'
));

if ($branch eq 'HEAD' || $branch ge 'REL_17') {
	push(@{$PGBuild::conf{config_opts}}, (
		'--enable-injection-points'
	));
}

if ($branch eq 'HEAD' || $branch ge 'REL_18') {
	push(@{$PGBuild::conf{config_opts}}, (
		'--with-libcurl',
		'--with-libnuma',
		'--with-liburing'
	));
}

# Building with --enable-nls currently fails some tests, see:
# https://postgr.es/m/flat/20250331.152829.1921392690375275165.horikyota.ntt%40gmail.com
@{$PGBuild::conf{config_opts}} = grep {!/--enable-nls/} @{$PGBuild::conf{config_opts}};

1;
